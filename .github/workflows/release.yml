name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y python3 python3-pip binutils

      - name: Install Python dependencies
        run: pip3 install pyinstaller textual

      - name: Build binary
        run: python3 -m PyInstaller smb-tui.spec

      - name: Rename binary with version
        run: |
          TAG=${GITHUB_REF_NAME}
          mv dist/smb-tui dist/smb-tui-${TAG}-linux-x86_64
          ls -lh dist/

      - name: Build deb package
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}
          PKG=smb-tui_${VERSION}_amd64

          mkdir -p ${PKG}/usr/local/bin
          mkdir -p ${PKG}/DEBIAN

          cp dist/smb-tui-${TAG}-linux-x86_64 ${PKG}/usr/local/bin/smb-tui
          chmod 755 ${PKG}/usr/local/bin/smb-tui

          cat > ${PKG}/DEBIAN/control <<EOF
          Package: smb-tui
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: husking
          Depends: samba-common-bin
          Description: Terminal UI and CLI for managing Samba (smb.conf) configuration and users
          EOF

          dpkg-deb --build ${PKG}
          ls -lh *.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/smb-tui-*
            *.deb
          generate_release_notes: true
          fail_on_unmatched_files: true
